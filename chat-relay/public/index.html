<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wendy Chat Pro</title>
    <style>
        :root { --sidebar-w: 260px; --viewer-w: 0px; --primary: #0084ff; --bg: #f0f2f5; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); display: flex; height: 100vh; margin: 0; overflow: hidden; }
        
        /* Sidebar & File Tree */
        #sidebar { width: var(--sidebar-w); background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; flex-shrink: 0; }
        .section-header { padding: 12px 15px; background: #f8f9fa; border-bottom: 1px solid #ddd; font-size: 13px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .file-list { list-style: none; margin: 0; padding: 0; overflow-y: auto; }
        .file-list li { padding: 8px 15px; border-bottom: 1px solid #f1f1f1; font-size: 12px; cursor: pointer; color: #444; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 8px; }
        .file-list li:hover { background: #f0f7ff; color: var(--primary); }
        .file-list li.active { background: #e7f3ff; color: var(--primary); font-weight: bold; }
        .collapsed { display: none; }

        /* Main Chat Area */
        #main-chat { flex: 1; display: flex; flex-direction: column; min-width: 300px; background: var(--bg); position: relative; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 85%; line-height: 1.5; font-size: 15px; word-wrap: break-word; white-space: pre-wrap; }
        .user { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .bot { align-self: flex-start; background: white; color: black; box-shadow: 0 1px 2px rgba(0,0,0,0.1); border-bottom-left-radius: 4px; }
        
        /* Neuron Panel (Observability) */
        #neuron-panel { padding: 8px 15px; background: #fffbe6; border-top: 1px solid #ffe58f; font-size: 12px; color: #856404; display: none; }
        #neuron-panel.active { display: block; }
        .tool-step { display: flex; align-items: center; gap: 6px; margin: 2px 0; }
        .spinner { width: 10px; height: 10px; border: 2px solid #ffe58f; border-top: 2px solid #faad14; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Input Area */
        #input-area { padding: 15px; background: white; display: flex; gap: 10px; border-top: 1px solid #ddd; align-items: center; }
        input[type="text"] { flex: 1; padding: 12px 18px; border: 1px solid #ddd; border-radius: 24px; outline: none; }
        button { padding: 8px 20px; background: var(--primary); color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; }
        #upload-btn { cursor: pointer; font-size: 20px; color: #666; }
        
        /* Drag & Drop Overlay */
        #drop-zone { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,132,255,0.1); border: 2px dashed var(--primary); display: none; align-items: center; justify-content: center; z-index: 100; pointer-events: none; }
        #drop-zone.active { display: flex; }

        /* File Viewer/Editor (Canvas) */
        #file-viewer { width: var(--viewer-w); background: white; border-left: 1px solid #ddd; display: flex; flex-direction: column; transition: width 0.3s; position: relative; flex-shrink: 0; }
        #file-viewer.active { var(--viewer-w): 600px; width: 600px; }
        #viewer-header { padding: 10px 15px; background: #f8f9fa; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        #viewer-controls { display: flex; gap: 10px; align-items: center; }
        #viewer-content, #viewer-editor { flex: 1; overflow: auto; padding: 20px; font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; font-size: 13px; line-height: 1.6; white-space: pre-wrap; background: #fafafa; border: none; width: 100%; box-sizing: border-box; resize: none; outline: none; }
        #viewer-editor { display: none; background: #fff; }
        
        .metadata-view { display: flex; flex-direction: column; gap: 20px; padding: 40px 20px; align-items: center; text-align: center; }
        .file-icon { font-size: 64px; margin-bottom: 10px; }
        .meta-item { font-size: 14px; color: #555; margin: 5px 0; font-family: sans-serif; }
        .download-action { margin-top: 20px; padding: 12px 30px; background: #28a745; color: white; border-radius: 8px; text-decoration: none; font-weight: bold; }

        .btn-small { padding: 4px 10px; font-size: 11px; border-radius: 4px; background: #eee; color: #333; border: 1px solid #ccc; cursor: pointer; }
        .btn-small.active { background: var(--primary); color: white; border-color: #0073e6; }
        .btn-save { background: #28a745; color: white; border-color: #218838; display: none; }
        .close-viewer { cursor: pointer; font-size: 20px; color: #999; margin-left: 10px; }
        .status { font-size: 11px; color: #999; text-align: center; margin: 5px 0; }

        #admin-badge { display: none; background: #ef4444; color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; margin-left: 5px; }

        /* Typing Indicator */
        .typing { display: none; align-self: flex-start; background: #e4e6eb; color: #65676b; padding: 8px 15px; border-radius: 18px; font-size: 13px; font-style: italic; margin-bottom: 10px; margin-left: 20px; align-items: center; gap: 10px; }
        .typing.active { display: flex; animation: pulse 1.5s infinite; }
        .stop-btn { background: #ff4d4f; color: white; border: none; border-radius: 4px; padding: 2px 8px; font-size: 11px; cursor: pointer; font-style: normal; font-weight: bold; text-transform: uppercase; line-height: 1.2; }
        .stop-btn:hover { background: #ff7875; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>

<body ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)">
    <div id="drop-zone">📂 Drop files to upload to Downloads</div>
    
    <div id="sidebar">
        <div class="section-header">
            <span>Wendy Pro - <span id="username">Guest</span><span id="admin-badge">Admin</span></span>
            <a href="/logout" style="font-size: 10px; color: #ef4444;">Logout</a>
        </div>
        <div class="section-header" onclick="toggleSection('ws-list', 'a-ws')">
            <span>Agent Workspace</span> <span id="a-ws">▼</span>
        </div>
        <ul id="ws-list" class="file-list"></ul>
        
        <div class="section-header" onclick="toggleSection('dl-list', 'a-dl')">
            <span>Downloads</span> <span id="a-dl">▶</span>
        </div>
        <ul id="dl-list" class="file-list collapsed"></ul>
        
        <div class="section-header" onclick="toggleSection('ext-list', 'a-ext')">
            <span>Utilities</span> <span id="a-ext">▼</span>
        </div>
        <ul id="ext-list" class="file-list">
            <li onclick="window.open('/ssh.html', '_blank')">🚀 SSH Terminal (Lobster)</li>
        </ul>
        
        <div class="section-header" onclick="toggleSection('doc-list', 'a-doc')">
            <span>Documentation</span> <span id="a-doc">▶</span>
        </div>
        <ul id="doc-list" class="file-list collapsed"></ul>
    </div>

    <div id="main-chat">
        <div id="chat"></div>
        <div id="neuron-panel"></div>
        <div id="typing-indicator" class="typing">
            <span id="typing-text">Wendy is thinking...</span>
            <button class="stop-btn" onclick="stopGeneration()">Stop</button>
        </div>
        <div id="input-area">
            <label id="upload-btn" title="Upload">📎<input type="file" id="file-input" style="display:none" multiple></label>
            <input type="text" id="msg-input" placeholder="Message Wendy..." autocomplete="off">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <div id="file-viewer">
        <div id="viewer-header">
            <strong id="viewer-filename">File Viewer</strong>
            <div id="viewer-controls">
                <button id="mode-read" class="btn-small active" onclick="setMode('read')">Read</button>
                <button id="mode-edit" class="btn-small" onclick="setMode('edit')">Edit</button>
                <button id="save-btn" class="btn-small btn-save" onclick="saveFile()">Save</button>
                <span class="close-viewer" onclick="closeViewer()">×</span>
            </div>
        </div>
        <div id="viewer-content"></div>
        <textarea id="viewer-editor"></textarea>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('msg-input');
        const btn = document.getElementById('send-btn');
        const viewer = document.getElementById('file-viewer');
        const vContent = document.getElementById('viewer-content');
        const vEditor = document.getElementById('viewer-editor');
        const vName = document.getElementById('viewer-filename');
        const fileInput = document.getElementById('file-input');
        const saveBtn = document.getElementById('save-btn');
        const modeReadBtn = document.getElementById('mode-read');
        const modeEditBtn = document.getElementById('mode-edit');
        const typingIndicator = document.getElementById('typing-indicator');
        const typingText = document.getElementById('typing-text');
        const neuronPanel = document.getElementById('neuron-panel');
        const dropZone = document.getElementById('drop-zone');

        let currentFile = { type: null, name: null };
        let botMsgDiv = null;
        let ws;

        const urlParams = new URLSearchParams(window.location.search);
        const authToken = urlParams.get('token');

        async function init() {
            try {
                const res = await fetch(`/user-info${authToken ? '?token='+authToken : ''}`);
                if (!res.ok) throw new Error('Unauthorized');
                const data = await res.json();
                if (!data.authenticated) { window.location.href = '/login.html'; return; }

                document.getElementById('username').textContent = data.user.username;
                if (data.user.isAdmin) document.getElementById('admin-badge').style.display = 'inline-block';
                
                if (authToken) window.history.replaceState({}, document.title, "/");

                connectWS();
                refreshList('workspace', 'ws-list');
            } catch (e) { window.location.href = '/login.html'; }
        }

        function connectWS() {
            ws = new WebSocket(`${location.protocol==='https:'?'wss:':'ws:'}//${location.host}${authToken ? '?token='+authToken : ''}`);
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.event === 'agent' && data.payload.stream === 'tools') {
                    const tool = data.payload.data;
                    if (tool.type === 'call') {
                        neuronPanel.classList.add('active');
                        const step = document.createElement('div');
                        step.className = 'tool-step';
                        step.id = `tool-${tool.callId}`;
                        step.innerHTML = `<div class="spinner"></div><span>Using <b>${tool.name}</b>...</span>`;
                        neuronPanel.appendChild(step);
                    } else if (tool.type === 'result') {
                        const step = document.getElementById(`tool-${tool.callId}`);
                        if (step) {
                            step.innerHTML = `✅ <span>Used <b>${tool.name}</b></span>`;
                            setTimeout(() => { step.remove(); if (neuronPanel.children.length === 0) neuronPanel.classList.remove('active'); }, 2000);
                        }
                    }
                }
                if (data.type === 'event' && data.event === 'agent' && data.payload.stream === 'assistant') {
                    const delta = data.payload.data.delta;
                    if (delta) {
                        typingIndicator.classList.remove('active');
                        if (!botMsgDiv) botMsgDiv = addMessage('', 'bot');
                        botMsgDiv.innerText += delta;
                        chat.scrollTop = chat.scrollHeight;
                    }
                }
                if (data.event === 'agent' && data.payload.stream === 'lifecycle' && data.payload.data.phase === 'start') {
                    botMsgDiv = null;
                    typingIndicator.classList.add('active');
                    typingText.innerText = 'Wendy is thinking...';
                    neuronPanel.innerHTML = '';
                }
                if (data.event === 'agent' && data.payload.stream === 'lifecycle' && data.payload.data.phase === 'end') {
                    typingIndicator.classList.remove('active');
                    neuronPanel.classList.remove('active');
                    refreshList('workspace', 'ws-list');
                    refreshList('files', 'dl-list');
                }
            };
            ws.onclose = () => { setTimeout(() => location.reload(), 3000); };
        }

        function setMode(mode) {
            modeReadBtn.classList.toggle('active', mode === 'read');
            modeEditBtn.classList.toggle('active', mode === 'edit');
            if (mode === 'edit') {
                vContent.style.display = 'none'; vEditor.style.display = 'block';
                vEditor.value = vContent.innerText; saveBtn.style.display = 'inline-block';
            } else {
                vContent.style.display = 'block'; vEditor.style.display = 'none'; saveBtn.style.display = 'none';
            }
        }

        async function saveFile() {
            if (!currentFile.name) return;
            const content = vEditor.value;
            saveBtn.disabled = true;
            try {
                const res = await fetch('/save-file', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: authToken, type: currentFile.type, filename: currentFile.name, content: content })
                });
                if (res.ok) { vContent.innerText = content; setMode('read'); addStatus(`Saved: ${currentFile.name}`); }
            } catch (e) { alert('Error saving file'); }
            saveBtn.disabled = false;
        }

        function toggleSection(id, arrowId) {
            const el = document.getElementById(id);
            const ar = document.getElementById(arrowId);
            el.classList.toggle('collapsed');
            ar.innerText = el.classList.contains('collapsed') ? '▶' : '▼';
            if (!el.classList.contains('collapsed')) refreshList(id === 'ws-list' ? 'workspace' : id === 'dl-list' ? 'files' : 'docs', id);
        }

        async function handleFileClick(type, filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const textExts = ['md', 'txt', 'js', 'json', 'yaml', 'yml', 'py', 'sh', 'html', 'css', 'ts', 'toml'];
            currentFile = { type, name: filename };
            vName.innerText = filename;
            if (textExts.includes(ext)) {
                try {
                    const res = await fetch(`/${type}/${encodeURIComponent(filename)}${authToken ? '?token='+authToken : ''}`);
                    vContent.innerText = await res.text();
                    modeReadBtn.style.display = modeEditBtn.style.display = 'inline-block';
                    setMode('read'); viewer.classList.add('active');
                } catch (e) { alert('Read failed'); }
            }
        }

        async function refreshList(type, listId) {
            try {
                const endpoint = type === 'workspace' ? 'list-workspace' : type === 'files' ? 'list-files' : 'list-docs';
                const res = await fetch(`/${endpoint}${authToken ? '?token='+authToken : ''}`);
                const data = await res.json();
                const list = document.getElementById(listId);
                list.innerHTML = '';
                data.files.forEach(f => {
                    const li = document.createElement('li');
                    li.innerHTML = `<span>${f.includes('.')?'📄':'📁'}</span> ${f}`;
                    li.onclick = () => handleFileClick(type, f);
                    list.appendChild(li);
                });
            } catch (e) {}
        }

        function addStatus(t) { const d=document.createElement('div'); d.className='status'; d.innerText=t; chat.appendChild(d); chat.scrollTop=chat.scrollHeight; }
        function addMessage(t, s) { const d=document.createElement('div'); d.className=`msg ${s}`; d.innerText=t; chat.appendChild(d); chat.scrollTop=chat.scrollHeight; return d; }

        function sendMessage() {
            const t = input.value.trim();
            if (!t || ws.readyState !== WebSocket.OPEN) return;
            addMessage(t, 'user'); input.value = ''; botMsgDiv = null;
            ws.send(JSON.stringify({ type: 'req', id: Math.random().toString(36).substring(7), method: 'chat.send', params: { message: t, thinking: 'low' } }));
        }

        btn.onclick = () => sendMessage();
        input.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };

        init();
    </script>
</body>
</html>
