<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lobster Terminal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <style>
        body { background: #000; margin: 0; padding: 10px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #terminal { flex: 1; width: 100%; height: 100%; }
        .header { color: #28a745; font-family: monospace; font-size: 14px; margin-bottom: 5px; border-bottom: 1px solid #333; padding-bottom: 5px; }
    </style>
</head>
<body>
    <div class="header">Connected to Lobster Machine via SSH Tunnel</div>
    <div id="terminal"></div>
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script>
        const authToken = sessionStorage.getItem('wendy_temp_token');
        const term = new Terminal({
            cursorBlink: true,
            fontSize: 14,
            theme: { background: '#000', foreground: '#fff' }
        });
        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open(document.getElementById('terminal'));
        fitAddon.fit();

        const ws = new WebSocket(`${location.protocol==='https:'?'wss:':'ws:'}//${location.host}/ssh-ws?token=${authToken}`);
        
        ws.onopen = () => {
            term.write('\r\n*** Connected to SSH Proxy ***\r\n');
            term.onData(data => ws.send(JSON.stringify({ type: 'data', data: data })));
            window.addEventListener('resize', () => {
                fitAddon.fit();
                ws.send(JSON.stringify({ type: 'resize', rows: term.rows, cols: term.cols }));
            });
            ws.send(JSON.stringify({ type: 'resize', rows: term.rows, cols: term.cols }));
        };

        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            if (msg.type === 'data') term.write(msg.data);
        };

        ws.onclose = () => term.write('\r\n*** Disconnected from Proxy ***\r\n');
    </script>
</body>
</html>
